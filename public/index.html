<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI Assistant</title>
<link rel="icon" href="../logo.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<h3>Chats</h3>

<button onclick="newChat()">+ New Chat</button>

<div id="history"></div>

</div>

<div class="app">

<header>

<h2>
    <img src="../logo.png" alt="AI Assistant Logo" class="logo-box">     AI Assistant
</h2>

</header>

<div id="chatArea" class="center-mode">

<div class="logo">AI Assistant</div>

<div id="chat"></div>

<div id="thinking">AI is thinking...</div>

<div id="composer" class="composer">

<input id="input" placeholder="What's on your mind?" autocomplete="off">

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤</button>

<button onclick="stopVoice()">Stop</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
