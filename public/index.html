<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI Assistant</title>
<link rel="icon" type="image/png" href="logo.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<h3>Chats</h3>

<button onclick="newChat()">+ New Chat</button>

<div id="history"></div>

</div>

<div class="app">

<header>
<h2>AI Assistant</h2>
</header>

<div id="chatArea">

<!-- CLICKABLE AI BUTTON -->

<div class="ai-container" id="aiContainer" onclick="startVoice()">

<div class="ai-circle">AI</div>

<div class="wave wave1"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

</div>

<div id="thinking">Tap AI to speak</div>

<div class="composer">

<button onclick="stopVoice()" class="stop-btn">
⏹ Stop
</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
